<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="logo-Upla.png" alt="Mi Logo">
    </div>
    <h1 class="titulo-header">Universidad Peruana los Andes | Samir Sabdiel Rojas Tamara</h1>
    <nav>
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="login.html" class="activo">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- FORMULARIO DE LOGIN -->
  <section class="login-section">
    <div class="login-container">
      <h2>Iniciar Sesión</h2>
      <form action="#" method="POST">
        <div class="input-group">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" required>
        </div>
        <div class="input-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="login-btn">Entrar</button>
      </form>
      <p class="login-extra">¿No tienes cuenta? <a href="#">Regístrate</a></p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
