<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portafolio - Universidad Peruana Los Andes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="logo">
      <img src="LogoUpla.png" alt="Logo UPLA">
    </div>
    <h1>Universidad Peruana Los Andes | Samir Sabdiel Rojas Tamara</h1>
    <nav>
      <ul>
        <li><a href="#" id="inicioBtn">Inicio</a></li>
        <li><a href="#" id="proyectosBtn">Proyectos</a></li>
        <li><a href="#" id="loginBtn">Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- Sección de Inicio -->
  <section id="inicioSection">
    <video autoplay muted loop id="bgVideo">
      <source src="espacio.mp4" type="video/mp4">
    </video>
    <div class="contenido-inicio">
      <h2>Bienvenido a mi Portafolio</h2>
    </div>
  </section>

  <!-- Sección de Proyectos -->
  <section id="proyectos" class="hidden">
    <h2>Proyectos Semanales</h2>
    <div id="proyectosContainer" class="proyectos-container"></div>
  </section>

  <!-- Sección de Login -->
  <section id="loginSection" class="hidden">
    <div class="login-container">
      <h2>Iniciar Sesión</h2>
      <input type="text" id="username" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">
      <button id="loginSubmit">Ingresar</button>
    </div>
  </section>

  <!-- Sección del Panel -->
  <section id="panel" class="hidden">
    <div class="panel-container">
      <h2>Panel de Administración</h2>
      <label for="semanaSelect">Seleccionar Semana:</label>
      <select id="semanaSelect"></select>

      <label for="archivoInput">Subir trabajo (PDF, ZIP o imagen):</label>
      <input type="file" id="archivoInput" />

      <button id="subirTrabajo">Subir Trabajo</button>

      <div id="trabajosSubidos">
        <h3>Trabajos subidos</h3>
        <ul id="listaTrabajos"></ul>
      </div>
    </div>
  </section>

  <footer>
    <p>© 2025 - Samir Sabdiel Rojas Tamara | Universidad Peruana Los Andes</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
